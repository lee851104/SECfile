<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC Downloader</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, "Segoe UI", Helvetica, sans-serif;
    background: #F5F5F7;
    color: #1D1D1F;
    height: 100vh;
    display: flex;
    padding: 16px;
}

.card {
    display: flex;
    width: 100%;
    background: #fff;
    border: 1px solid #E5E5E7;
    border-radius: 12px;
    overflow: hidden;
}

/* ── Sidebar ─────────────────────────────── */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: #FAFAFA;
    border-right: 1px solid #E5E5E7;
    padding: 24px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.sidebar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    color: #0071E3;
    margin-bottom: 20px;
}

.field-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .06em;
    color: #86868B;
    margin-bottom: 4px;
}

.autocomplete-wrap { position: relative; }

#tickerInput {
    width: 100%;
    font-size: 22px;
    font-weight: 700;
    color: #1D1D1F;
    background: #fff;
    border: 1px solid #E5E5E7;
    border-radius: 8px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .15s;
}
#tickerInput:focus { border-color: #0071E3; }

.ac-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #fff;
    border: 1px solid #E5E5E7;
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,.12);
    z-index: 200;
    overflow: hidden;
    display: none;
}
.ac-item {
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid #F5F5F7;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: #EBF4FF; }
.ac-ticker { font-weight: 700; color: #0071E3; }
.ac-name   { color: #86868B; margin-left: 6px; font-size: 12px; }

.ticker-hint {
    font-size: 12px;
    color: #34C759;
    margin-top: 4px;
    min-height: 16px;
}

.btn-search {
    width: 100%;
    background: #0071E3;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: background .15s;
}
.btn-search:hover:not(:disabled) { background: #0058B0; }
.btn-search:disabled { background: #ADADB8; cursor: default; }

hr.div { border: none; border-top: 1px solid #E5E5E7; margin: 18px 0; }

select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #E5E5E7;
    border-radius: 8px;
    background: #fff;
    font-size: 14px;
    color: #1D1D1F;
    outline: none;
    cursor: pointer;
}

.chk-group { display: flex; flex-direction: column; gap: 6px; }
.chk-group label {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; cursor: pointer;
}

.spacer { flex: 1; }

.btn-download {
    width: 100%;
    background: #1D1D1F;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
}
.btn-download:hover:not(:disabled) { background: #3A3A3C; }
.btn-download:disabled { background: #ADADB8; cursor: default; }

.sel-count {
    font-size: 12px;
    color: #ADADB8;
    text-align: center;
    margin-top: 6px;
}

/* ── Main ────────────────────────────────── */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
}

.main-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 22px 24px 10px;
}
.main-title { font-size: 16px; font-weight: 700; }
.file-count { font-size: 12px; color: #ADADB8; }
.header-actions { margin-left: auto; display: flex; gap: 4px; }
.link-btn {
    background: none; border: none;
    color: #0071E3; font-size: 12px;
    cursor: pointer; padding: 4px 6px;
}
.link-btn:hover { text-decoration: underline; }

.col-headers {
    display: grid;
    grid-template-columns: 36px 80px 120px 1fr 90px;
    padding: 0 24px 6px;
    font-size: 11px;
    color: #ADADB8;
    border-bottom: 1px solid #E5E5E7;
}

.file-list { flex: 1; overflow-y: auto; }

.file-row {
    display: grid;
    grid-template-columns: 36px 80px 120px 1fr 90px;
    align-items: center;
    padding: 10px 24px;
    border-bottom: 1px solid #F5F5F7;
    cursor: pointer;
    transition: background .1s;
    user-select: none;
}
.file-row:hover { background: #F9F9FB; }

.badge {
    display: inline-block;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
}
.badge-k { color: #0071E3; background: #E8F2FC; }
.badge-q { color: #9B59B6; background: #F3EAF9; }

.date-cell  { font-size: 12px; font-family: Consolas, monospace; color: #6E6E73; }
.fname-cell { font-size: 13px; font-weight: 600; }
.stat-cell  { font-size: 11px; text-align: right; color: #ADADB8; }
.stat-done    { color: #34C759; }
.stat-active  { color: #0071E3; }
.stat-error   { color: #FF3B30; }
.stat-skipped { color: #FF9F0A; }

.empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 180px; color: #ADADB8; font-size: 14px;
}

/* ── Progress ────────────────────────────── */
.progress-area {
    border-top: 1px solid #E5E5E7;
    padding: 14px 24px;
}
.prog-header {
    display: flex; justify-content: space-between;
    margin-bottom: 6px;
}
.prog-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: #86868B; }
.prog-count { font-size: 12px; color: #ADADB8; }

.bar-bg {
    height: 4px; background: #E5E5E7;
    border-radius: 2px; overflow: hidden;
}
.bar-fill {
    height: 100%; background: #34C759;
    border-radius: 2px; width: 0%;
    transition: width .3s ease;
}

.log-area {
    height: 54px; overflow-y: auto;
    margin-top: 8px;
    font-size: 11px; font-family: Consolas, monospace;
    line-height: 1.6; white-space: pre-wrap;
}
.log-success { color: #34C759; }
.log-error   { color: #FF3B30; }
.log-warn    { color: #FF9F0A; }
.log-info    { color: #ADADB8; }

/* ── Folder picker ───────────────────────── */
.folder-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    border: 1px solid #E5E5E7;
    border-radius: 8px;
    padding: 7px 10px;
    margin-top: 4px;
}
.folder-path {
    flex: 1;
    font-size: 11px;
    font-family: Consolas, monospace;
    color: #6E6E73;
    white-space: normal;
    overflow: hidden;
    text-overflow: ellipsis;
    word-break: break-all;
    max-height: 2.4em;
    line-height: 1.2em;
}
.btn-browse {
    background: none;
    border: 1px solid #E5E5E7;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: #0071E3;
    cursor: pointer;
    white-space: nowrap;
    transition: background .1s;
}
.btn-browse:hover:not(:disabled) { background: #EBF4FF; }
.btn-browse:disabled { color: #ADADB8; cursor: default; }

.btn-open-folder {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #E5E5E7;
    color: #ADADB8;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: default;
    margin-top: 8px;
    transition: background .2s, color .2s;
    width: fit-content;
}
.btn-open-folder.ready {
    background: #34C759;
    color: #fff;
    cursor: pointer;
}
.btn-open-folder.ready:hover { background: #2ebd50; }
</style>
</head>
<body>
<div class="card">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">SEC DOWNLOADER</div>

    <div class="field-label">TICKER</div>
    <div class="autocomplete-wrap">
      <input id="tickerInput" class="ticker-input" type="text"
             placeholder="AAPL" autocomplete="off" spellcheck="false">
      <div id="acDropdown" class="ac-dropdown"></div>
    </div>
    <div class="ticker-hint" id="tickerHint"></div>

    <button class="btn-search" id="btnSearch">SEARCH</button>

    <hr class="div">

    <div class="field-label">YEAR</div>
    <select id="yearSelect"><option value="All">All</option></select>

    <hr class="div">

    <div class="field-label">TYPE</div>
    <div class="chk-group" style="margin-top:6px">
      <label><input type="checkbox" id="chk10K" checked> 10-K Annual</label>
      <label><input type="checkbox" id="chk10Q" checked> 10-Q Quarterly</label>
    </div>

    <hr class="div">

    <div class="field-label">FOLDER</div>
    <div class="folder-row">
      <span class="folder-path" id="folderPath">…</span>
      <button class="btn-browse" id="btnBrowse">Browse</button>
    </div>

    <div class="spacer"></div>

    <button class="btn-download" id="btnDownload" disabled>⬇ DOWNLOAD</button>
    <div class="sel-count" id="selCount">No files selected</div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <span class="main-title">Download Queue</span>
      <span class="file-count" id="fileCount"></span>
      <div class="header-actions">
        <button class="link-btn" id="btnSelAll">Select All</button>
        <button class="link-btn" id="btnDeselAll">Deselect All</button>
      </div>
    </div>

    <div class="col-headers">
      <span></span><span>Type</span><span>Filing Date</span>
      <span>Filename</span><span style="text-align:right">Status</span>
    </div>

    <div class="file-list" id="fileList">
      <div class="empty-state">Enter a ticker and click SEARCH</div>
    </div>

    <div class="progress-area">
      <div class="prog-header">
        <span class="prog-label">PROGRESS</span>
        <span class="prog-count" id="progCount"></span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
      <div class="log-area" id="logArea"></div>
      <button class="btn-open-folder" id="btnOpenFolder" disabled>
        📁 Open Folder
      </button>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────
let allFilings   = [];
let filtered     = [];
let fyeMonth     = 12;
let ticker       = '';
let lastFolder   = '';
let statuses     = {};

// ── Folder ────────────────────────────────────────────────
let selectedFolderHandle = null;

async function loadFolder() {
    // 優先從 localStorage 讀取之前選擇的資料夾
    try {
        const saved = localStorage.getItem('selectedFolderPath');
        if (saved) {
            setFolderDisplay(saved);
            return;
        }
    } catch (e) {
        console.log('localStorage not available');
    }

    // 若沒有之前的選擇，從伺服器取得預設資料夾（會自動建立）
    try {
        const r = await fetch('/api/browse-folder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: '' })
        });
        const d = await r.json();
        if (d.ok || d.path) {
            setFolderDisplay(d.path);
        }
    } catch (e) {
        console.log('Cannot load default folder:', e);
        setFolderDisplay('/tmp/downloads');
    }
}

function setFolderDisplay(path) {
    lastFolder = path;
    try {
        localStorage.setItem('selectedFolderPath', path);
    } catch (e) {
        console.log('Cannot save to localStorage');
    }

    // 顯示完整路徑，並在標題欄提示
    document.getElementById('folderPath').textContent = path;
    document.getElementById('folderPath').title = path;
}

document.getElementById('btnBrowse').addEventListener('click', async () => {
    const btn = document.getElementById('btnBrowse');
    btn.textContent = 'Picking…';
    btn.disabled = true;

    try {
        // 優先使用 File System Access API（本地 Chrome/Edge）
        if ('showDirectoryPicker' in window) {
            try {
                const dirHandle = await window.showDirectoryPicker();
                const fullPath = await getFullPath(dirHandle);
                console.log('[btnBrowse] Selected path:', fullPath);

                // 發送路徑到後端驗證
                console.log('[btnBrowse] Sending path to server:', fullPath);
                const r = await fetch('/api/browse-folder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: fullPath })
                });
                const d = await r.json();
                console.log('[btnBrowse] Server response:', d);

                if (d.ok || d.path) {
                    console.log('[btnBrowse] Setting folder display to:', d.path);
                    setFolderDisplay(d.path);
                    log(`✓ Download folder set to: ${d.path}`, 'success');
                } else {
                    alert('Error: ' + (d.error || 'Unknown error'));
                }
            } catch (e) {
                if (e.name !== 'AbortError') {
                    console.error('Error selecting folder:', e);
                    log('✗ Could not select folder: ' + e.message, 'error');
                    // Fallback：顯示提示並使用預設路徑
                    alert('Could not select folder. Using default download folder.');
                    await loadFolder();
                }
            }
        } else {
            // Render 或其他環境：不支援 File System Access API
            alert('Folder selection not available.\n\nThe application will use the default download folder: ' + lastFolder);
        }
    } finally {
        btn.textContent = 'Browse';
        btn.disabled = false;
    }
});

// 嘗試取得資料夾的完整路徑
async function getFullPath(dirHandle) {
    try {
        // 嘗試使用 path 屬性（在 Chrome/Edge 中支援）
        if (dirHandle.path) {
            console.log('Got full path from dirHandle.path:', dirHandle.path);
            return dirHandle.path;
        }
    } catch (e) {
        console.log('Cannot get full path via path property:', e);
    }

    // Fallback：用相對路徑的方式重建路徑
    try {
        // 在某些瀏覽器中，可以透過 isSameEntry 來取得路徑
        const parts = [];
        let current = dirHandle;

        while (current) {
            parts.unshift(current.name);
            try {
                const parent = await current.getParent?.();
                if (!parent) break;
                current = parent;
            } catch (e) {
                break;
            }
        }

        if (parts.length > 0) {
            const path = parts.join('\\');
            console.log('Reconstructed path:', path);
            return path;
        }
    } catch (e) {
        console.log('Cannot reconstruct path:', e);
    }

    // 最後 fallback：使用資料夾名稱
    console.log('Using fallback folder name:', dirHandle.name);
    return dirHandle.name || 'selected_folder';
}

document.getElementById('btnOpenFolder').addEventListener('click', () => {
    const btn = document.getElementById('btnOpenFolder');
    if (!btn.classList.contains('ready')) return;
    const path = lastFolder || '';
    if (path) fetch(`/api/open-folder?path=${encodeURIComponent(path)}`);
});

loadFolder();

// ── Autocomplete ──────────────────────────────────────────
const tickerInput = document.getElementById('tickerInput');
const acDropdown  = document.getElementById('acDropdown');
let acData = [], acIdx = -1, acTimer = null;

tickerInput.addEventListener('input', () => {
    clearTimeout(acTimer);
    const q = tickerInput.value.trim();
    if (!q) { closeAc(); return; }
    acTimer = setTimeout(() => loadAc(q), 120);
});

tickerInput.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { acIdx = Math.min(acIdx + 1, acData.length - 1); renderAc(); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { acIdx = Math.max(acIdx - 1, 0); renderAc(); e.preventDefault(); }
    else if (e.key === 'Enter') {
        if (acIdx >= 0 && acData[acIdx]) pickAc(acData[acIdx]);
        else { closeAc(); doSearch(); }
    }
    else if (e.key === 'Escape') closeAc();
});

document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete-wrap')) closeAc();
});

async function loadAc(q) {
    const r = await fetch(`/api/autocomplete?q=${encodeURIComponent(q)}`);
    acData = await r.json(); acIdx = -1; renderAc();
}

function renderAc() {
    if (!acData.length) { closeAc(); return; }
    acDropdown.innerHTML = acData.map((s, i) =>
        `<div class="ac-item ${i === acIdx ? 'active' : ''}" data-i="${i}">
           <span class="ac-ticker">${s.ticker}</span>
           <span class="ac-name">${s.name}</span>
         </div>`
    ).join('');
    acDropdown.style.display = 'block';
    acDropdown.querySelectorAll('.ac-item').forEach(el =>
        el.addEventListener('mousedown', e => {
            e.preventDefault();
            pickAc(acData[+el.dataset.i]);
        })
    );
}

function pickAc(s) {
    tickerInput.value = s.ticker;
    document.getElementById('tickerHint').textContent = s.name;
    closeAc();
}

function closeAc() { acDropdown.style.display = 'none'; acData = []; acIdx = -1; }

// ── Search ────────────────────────────────────────────────
const btnSearch = document.getElementById('btnSearch');
btnSearch.addEventListener('click', doSearch);
tickerInput.addEventListener('keydown', e => { if (e.key === 'Enter' && acIdx < 0) doSearch(); });

async function doSearch() {
    const t = tickerInput.value.trim().toUpperCase();
    if (!t) return;
    btnSearch.disabled = true;
    btnSearch.textContent = 'SEARCHING…';
    log('Searching ' + t + ' …', 'info');

    try {
        const r = await fetch(`/api/search?ticker=${encodeURIComponent(t)}`);
        const d = await r.json();
        if (d.error) { log('✗ ' + d.error, 'error'); return; }

        ticker     = d.ticker;
        fyeMonth   = d.fye_month;
        allFilings = d.filings;
        statuses   = {};

        document.getElementById('tickerHint').textContent = d.name;

        const ySel = document.getElementById('yearSelect');
        ySel.innerHTML = '<option value="All">All</option>' +
            d.years.map(y => `<option value="${y}">${y}</option>`).join('');

        applyFilters();
        log(`Found ${d.filings.length} filings`, 'info');
    } catch(e) {
        log('✗ ' + e, 'error');
    } finally {
        btnSearch.disabled = false;
        btnSearch.textContent = 'SEARCH';
    }
}

// ── Filters ───────────────────────────────────────────────
document.getElementById('yearSelect').addEventListener('change', applyFilters);
document.getElementById('chk10K').addEventListener('change', applyFilters);
document.getElementById('chk10Q').addEventListener('change', applyFilters);

function applyFilters() {
    const year   = document.getElementById('yearSelect').value;
    const show10K = document.getElementById('chk10K').checked;
    const show10Q = document.getElementById('chk10Q').checked;

    filtered = allFilings.filter(f => {
        if (f.form_type === '10-K' && !show10K) return false;
        if (f.form_type === '10-Q' && !show10Q) return false;
        if (year !== 'All' && !f.report_date.startsWith(year)) return false;
        return true;
    });
    renderList();
}

// ── File list ─────────────────────────────────────────────
function renderList() {
    const list = document.getElementById('fileList');

    if (!filtered.length) {
        list.innerHTML = '<div class="empty-state">No matching files</div>';
        updateCount(); return;
    }

    list.innerHTML = filtered.map((f, i) => {
        const bc  = f.form_type === '10-K' ? 'badge-k' : 'badge-q';
        const st  = statuses[f.accession_number] || { text: '—', cls: '' };
        const name = f.filename.replace('.md', '');
        return `<div class="file-row" data-i="${i}">
          <input type="checkbox" class="row-chk" data-i="${i}" checked>
          <span><span class="badge ${bc}">${f.form_type}</span></span>
          <span class="date-cell">${f.filing_date}</span>
          <span class="fname-cell">${name}</span>
          <span class="stat-cell ${st.cls}" id="stat_${i}">${st.text}</span>
        </div>`;
    }).join('');

    // row click toggles checkbox
    list.querySelectorAll('.file-row').forEach(row => {
        row.addEventListener('click', e => {
            if (e.target.type === 'checkbox') return;
            const chk = row.querySelector('.row-chk');
            chk.checked = !chk.checked;
            updateCount();
        });
    });
    list.querySelectorAll('.row-chk').forEach(c =>
        c.addEventListener('change', updateCount)
    );

    updateCount();
    document.getElementById('btnDownload').disabled = false;
}

function updateCount() {
    const total = filtered.length;
    const sel   = [...document.querySelectorAll('.row-chk')].filter(c => c.checked).length;
    document.getElementById('fileCount').textContent = `· ${total} files, ${sel} selected`;
    document.getElementById('selCount').textContent =
        sel > 0 ? `${sel} files selected` : 'No files selected';
}

document.getElementById('btnSelAll').addEventListener('click',   () => { document.querySelectorAll('.row-chk').forEach(c => c.checked = true);  updateCount(); });
document.getElementById('btnDeselAll').addEventListener('click', () => { document.querySelectorAll('.row-chk').forEach(c => c.checked = false); updateCount(); });

// ── Download ──────────────────────────────────────────────
document.getElementById('btnDownload').addEventListener('click', doDownload);

async function doDownload() {
    const selected = filtered.filter((_, i) => {
        const c = document.querySelector(`.row-chk[data-i="${i}"]`);
        return c && c.checked;
    });
    if (!selected.length) return;

    document.getElementById('btnDownload').disabled = true;
    document.getElementById('barFill').style.width = '0%';
    document.getElementById('progCount').textContent = `0 / ${selected.length}`;

    // reset row statuses
    selected.forEach((f, i) => setRowStat(f.accession_number, '—', ''));

    try {
        const r = await fetch('/api/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker, fye_month: fyeMonth, filings: selected }),
        });
        const { task_id } = await r.json();
        if (!task_id) throw new Error('No task_id returned');
        streamProgress(task_id, selected);
    } catch(e) {
        log('✗ ' + e, 'error');
        document.getElementById('btnDownload').disabled = false;
    }
}

function streamProgress(taskId, selected) {
    const es = new EventSource(`/api/progress/${taskId}`);
    let lastUpdate = Date.now();

    es.onmessage = e => {
        lastUpdate = Date.now();
        try {
            const evt = JSON.parse(e.data);
            if (evt.type === 'ping') return;

            if (evt.type === 'progress') {
                const pct = evt.total > 0 ? (evt.done / evt.total * 100) : 0;
                document.getElementById('barFill').style.width = pct + '%';
                document.getElementById('progCount').textContent = `${evt.done} / ${evt.total}`;
                if (evt.done < selected.length)
                    setRowStat(selected[evt.done].accession_number, '⬇ Downloading…', 'stat-active');
                if (evt.done > 0)
                    setRowStat(selected[evt.done - 1].accession_number, '✓ Done', 'stat-done');
            }
            else if (evt.type === 'log') {
                log(evt.msg, evt.level);
            }
            else if (evt.type === 'done') {
                if (selected.length)
                    setRowStat(selected[selected.length - 1].accession_number, '✓ Done', 'stat-done');
                document.getElementById('barFill').style.width = '100%';
                log('✓ All downloads complete', 'success');
                document.getElementById('btnDownload').disabled = false;
                // 顯示「Open Folder」按鈕，指向下載的資料夾
                if (evt.folder) setFolderDisplay(evt.folder);
                const openBtn = document.getElementById('btnOpenFolder');
                openBtn.disabled = false;
                openBtn.classList.add('ready');
                es.close();
            }
            else if (evt.type === 'error') {
                log('✗ Error: ' + evt.msg, 'error');
                document.getElementById('btnDownload').disabled = false;
                es.close();
            }
        } catch (parseErr) {
            log('✗ Message parse error: ' + parseErr.message, 'error');
            console.error('Parse error:', parseErr, 'Raw data:', e.data);
            document.getElementById('btnDownload').disabled = false;
            es.close();
        }
    };

    es.onerror = () => {
        log('✗ Connection lost (server timeout or error)', 'error');
        document.getElementById('btnDownload').disabled = false;
        es.close();
    };
}

function setRowStat(accNum, text, cls) {
    filtered.forEach((f, i) => {
        if (f.accession_number !== accNum) return;
        const el = document.getElementById(`stat_${i}`);
        if (el) { el.textContent = text; el.className = `stat-cell ${cls}`; }
        statuses[accNum] = { text, cls };
    });
}

// ── Log ───────────────────────────────────────────────────
function log(msg, level = 'info') {
    const area = document.getElementById('logArea');
    const span = document.createElement('span');
    span.className = 'log-' + level;
    span.textContent = msg + '\n';
    area.appendChild(span);
    area.scrollTop = area.scrollHeight;
}
